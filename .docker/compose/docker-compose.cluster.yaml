networks:
  rustfs-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 10.89.2.0/24
          gateway: 10.89.2.1

services:
  node0:
    image: rustfs/rustfs:latest # Replace with your image name and label
    container_name: node0
    hostname: node0
    environment:
      - RUSTFS_VOLUMES=http://node{0...3}:9000/data/rustfs{0...3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUST_LOG=warn
      - no_proxy=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
      - NO_PROXY=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
    # platform: linux/amd64  # Commented out for podman compatibility
    ports:
      - "9000:9000" # Map port 9000 of the host to port 9000 of the container
    volumes:
      - ../../target/x86_64-unknown-linux-musl/release/rustfs:/app/rustfs
      - ./data/node0/disk1:/data/rustfs0
      - ./data/node0/disk2:/data/rustfs1
      - ./data/node0/disk3:/data/rustfs2
      - ./data/node0/disk4:/data/rustfs3
    command: "/app/rustfs"
    extra_hosts:
      - "node0:10.89.2.2"
      - "node1:10.89.2.3"
      - "node2:10.89.2.4"
      - "node3:10.89.2.5"
    networks:
      rustfs-cluster:
        ipv4_address: 10.89.2.2

  node1:
    image: rustfs/rustfs:latest
    container_name: node1
    hostname: node1
    environment:
      - RUSTFS_VOLUMES=http://node{0...3}:9000/data/rustfs{0...3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfsadmin
      - RUST_LOG=warn
      - no_proxy=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
      - NO_PROXY=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
    # platform: linux/amd64  # Commented out for podman compatibility
    ports:
      - "9001:9000" # Map port 9001 of the host to port 9000 of the container
    volumes:
      - ../../target/x86_64-unknown-linux-musl/release/rustfs:/app/rustfs
      - ./data/node1/disk1:/data/rustfs0
      - ./data/node1/disk2:/data/rustfs1
      - ./data/node1/disk3:/data/rustfs2
      - ./data/node1/disk4:/data/rustfs3
    command: "/app/rustfs"
    extra_hosts:
      - "node0:10.89.2.2"
      - "node1:10.89.2.3"
      - "node2:10.89.2.4"
      - "node3:10.89.2.5"
    networks:
      rustfs-cluster:
        ipv4_address: 10.89.2.3

  node2:
    image: rustfs/rustfs:latest
    container_name: node2
    hostname: node2
