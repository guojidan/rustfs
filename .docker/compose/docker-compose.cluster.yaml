      - no_proxy=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
      - NO_PROXY=node0,node1,node2,node3,localhost,127.0.0.1,10.89.2.0/24
    # platform: linux/amd64  # Commented out for podman compatibility
    ports:
      - "9003:9000" # Map port 9003 of the host to port 9000 of the container
    volumes:
      - ../../target/x86_64-unknown-linux-musl/release/rustfs:/app/rustfs
      - ./data/node3/disk1:/data/rustfs0
      - ./data/node3/disk2:/data/rustfs1
      - ./data/node3/disk3:/data/rustfs2
      - ./data/node3/disk4:/data/rustfs3
    command: "/app/rustfs"
    extra_hosts:
      - "node0:10.89.2.2"
      - "node1:10.89.2.3"
      - "node2:10.89.2.4"
      - "node3:10.89.2.5"
    networks:
